<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">FitTracker</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="tracker.html" class="active">Tracker</a></li>
                <li><a href="plans.html">Plans</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <button id="darkModeToggle" class="dark-mode-btn"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <section class="tracker-section">
        <div class="container">
            <h2>Add New Workout</h2>
            <form id="workoutForm" class="workout-form">
                <div class="form-group">
                    <label for="exerciseName">Exercise Name</label>
                    <input type="text" id="exerciseName" required>
                </div>
                <div class="form-group">
                    <label for="sets">Sets</label>
                    <input type="number" id="sets" min="1" required>
                </div>
                <div class="form-group">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" min="1" required>
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" min="0" step="0.5" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="btn-primary">Save Workout</button>
            </form>

            <h2>Your Workouts</h2>
            <div class="workouts-table-container">
                <table id="workoutsTable" class="workouts-table">
                    <thead>
                        <tr>
                            <th>Exercise</th>
                            <th>Sets</th>
                            <th>Reps</th>
                            <th>Weight</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="workoutsTableBody">
                        <!-- Workouts will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 FitTracker. All rights reserved.</p>
            <div class="social-links">
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
