<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - History</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">FitTracker</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="tracker.html">Tracker</a></li>
                <li><a href="plans.html">Plans</a></li>
                <li><a href="history.html" class="active">History</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <button id="darkModeToggle" class="dark-mode-btn"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <section class="history-section">
        <div class="container">
            <h2>Workout History</h2>
            
            <div class="filters">
                <div class="filter-group">
                    <label for="filterDate">Filter by Date:</label>
                    <input type="date" id="filterDate">
                </div>
                <div class="filter-group">
                    <label for="searchExercise">Search Exercise:</label>
                    <input type="text" id="searchExercise" placeholder="Enter exercise name">
                </div>
                <button id="clearFilters" class="btn-secondary">Clear Filters</button>
            </div>

            <div class="summary-cards">
                <div class="summary-card">
                    <h3>Total Workouts</h3>
                    <p id="totalWorkouts">0</p>
                </div>
                <div class="summary-card">
                    <h3>Most Frequent Exercise</h3>
                    <p id="mostFrequent">None</p>
                </div>
                <div class="summary-card">
                    <h3>Weekly Progress</h3>
                    <p id="weeklyProgress">0 workouts this week</p>
                </div>
            </div>

            <div class="history-table-container">
                <table id="historyTable" class="history-table">
                    <thead>
                        <tr>
                            <th>Exercise</th>
                            <th>Sets</th>
                            <th>Reps</th>
                            <th>Weight</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- History will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 FitTracker. All rights reserved.</p>
            <div class="social-links">
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
